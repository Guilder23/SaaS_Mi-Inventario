<!-- MODAL: CREAR COMUNICADO -->
<div class="modal fade" id="modalCrearComunicado" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus"></i> Nuevo Comunicado</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="{% url 'comunicados_list' %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="crear_comunicado">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="com_titulo">Título <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="com_titulo" name="titulo" required maxlength="200" placeholder="Ej: Mantenimiento programado">
                    </div>
                    <div class="form-group">
                        <label for="com_mensaje">Mensaje <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="com_mensaje" name="mensaje" required rows="4" placeholder="Ej: Estaremos en mantenimiento el domingo a las 2:00 AM"></textarea>
                    </div>
                    <div class="form-group mb-0">
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="com_publicar" name="publicar">
                            <label class="custom-control-label" for="com_publicar">Publicar inmediatamente</label>
                        </div>
                        <small class="form-text text-muted">Si no publicas, quedará como borrador.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
