<!-- MODAL: EDITAR COMUNICADO -->
<div class="modal fade" id="modalEditarComunicado" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit"></i> Editar Comunicado</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="{% url 'comunicados_list' %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="editar_comunicado">
                <input type="hidden" name="comunicado_id" id="editarComunicadoId">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editarComunicadoTitulo">Título <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editarComunicadoTitulo" name="titulo" required maxlength="200">
                    </div>
                    <div class="form-group mb-0">
                        <label for="editarComunicadoMensaje">Mensaje <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="editarComunicadoMensaje" name="mensaje" required rows="4"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
