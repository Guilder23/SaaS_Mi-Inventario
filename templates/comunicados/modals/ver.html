<!-- MODAL: VER COMUNICADO -->
<div class="modal fade" id="modalVerComunicado" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-eye"></i> Ver Comunicado</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="com-card">
                    <div class="com-row">
                        <span class="com-label">Título:</span>
                        <span class="com-value" id="verComTitulo">-</span>
                    </div>
                    <div class="com-row">
                        <span class="com-label">Mensaje:</span>
                        <div class="com-value" id="verComMensaje">-</div>
                    </div>
                    <div class="com-row">
                        <span class="com-label">Estado:</span>
                        <span class="com-value" id="verComEstado">-</span>
                    </div>
                    <div class="com-row">
                        <span class="com-label">Publicación:</span>
                        <span class="com-value" id="verComFecha">-</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cerrar</button>
            </div>
        </div>
    </div>
</div>
