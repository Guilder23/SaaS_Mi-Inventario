<div class="modal fade" id="modalEliminarCliente" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-lock"></i> Cambiar Estado
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEliminarCliente" method="post">
                {% csrf_token %}
                <input type="hidden" name="action" value="toggle_admin">
                <input type="hidden" id="eliminarClienteId" name="perfil_id">
                <div class="modal-body">
                    <p id="eliminarClienteTexto" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Confirmar</button>
                </div>
            </form>
        </div>
    </div>
</div>
