<div class="modal fade" id="modalCrearEmpresa" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-building"></i> Crear Nueva Empresa
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formCrearEmpresa" method="post">
                {% csrf_token %}
                <input type="hidden" name="action" value="crear_empresa">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            required
                            maxlength="200"
                            placeholder="Ingrese el nombre de la empresa"
                        >
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label for="plan" class="form-label">Plan</label>
                            <select class="form-control" id="plan" name="plan">
                                {% for p in planes %}
                                    <option value="{{ p.codigo }}" {% if not p.activo %}disabled{% endif %}>
                                        {{ p.nombre }}{% if not p.activo %} (Inactivo){% endif %}
                                    </option>
                                {% empty %}
                                    <option value="basico">Basico</option>
                                    <option value="pro">Pro</option>
                                    <option value="enterprise">Enterprise</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group col-md-4">
                            <label for="dias_vigencia" class="form-label">Dias de vigencia</label>
                            <input type="number" class="form-control" id="dias_vigencia" name="dias_vigencia" min="1" value="30">
                        </div>
                        <div class="form-group col-md-4">
                            <label for="fecha_vencimiento" class="form-label">Fecha vencimiento</label>
                            <input type="date" class="form-control" id="fecha_vencimiento" name="fecha_vencimiento">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="notas" class="form-label">Notas</label>
                        <textarea class="form-control" id="notas" name="notas" rows="3" placeholder="Notas opcionales"></textarea>
                    </div>
                    <div class="form-group mb-0">
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="activa" name="activa" checked>
                            <label class="custom-control-label" for="activa">Empresa activa</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Empresa
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
