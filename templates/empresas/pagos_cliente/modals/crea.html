<div class="modal fade" id="modalCrearPago" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-upload"></i> Enviar Comprobante
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formCrearPago" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label for="monto" class="form-label">Monto <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" id="monto" name="monto" required>
                        </div>
                        <div class="form-group col-md-4">
                            <label for="moneda" class="form-label">Moneda</label>
                            <select class="form-control" id="moneda" name="moneda">
                                <option value="BOB">BOB</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                        <div class="form-group col-md-4">
                            <label for="comprobante" class="form-label">Comprobante <span class="text-danger">*</span></label>
                            <input type="file" class="form-control" id="comprobante" name="comprobante" accept="image/*" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="comentario" class="form-label">Comentario</label>
                        <textarea class="form-control" id="comentario" name="comentario" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Enviar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
