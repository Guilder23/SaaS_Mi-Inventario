{% load static %}
<!-- Modal Imprimir Inventario -->
<div class="modal fade" id="modalImprimir" tabindex="-1" role="dialog" aria-labelledby="modalImprimirLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl" role="document">
        <div class="modal-content">
            <div class="modal-header d-print-none">
                <h5 class="modal-title" id="modalImprimirLabel">
                    <i class="fas fa-print mr-2"></i>Vista Previa de Impresión
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="row h-100 m-0">
                    <!-- Panel Izquierdo: Configuración -->
                    <div class="col-md-3 border-right p-0 d-print-none" style="background-color: #f8f9fc;">
                        <div class="config-panel-header border-bottom">
                            <h6 class="font-weight-bold text-primary mb-0">Configuración del Reporte</h6>
                        </div>
                        
                        <div class="config-columns-scroll">
                            <h6 class="small font-weight-bold text-uppercase text-muted mb-3">Columnas Visibles</h6>
                            
                            <!-- Grupo 1: Identificación -->
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpFoto" checked>
                                <label class="custom-control-label" for="colImpFoto">Foto</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpCodigo" checked>
                                <label class="custom-control-label" for="colImpCodigo">Código</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpProducto" checked>
                                <label class="custom-control-label" for="colImpProducto">Producto</label>
                            </div>

                            <hr class="my-2">

                            <!-- Grupo 2: Clasificación -->
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpCategoria" checked>
                                <label class="custom-control-label" for="colImpCategoria">Categoría</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpRol" checked>
                                <label class="custom-control-label" for="colImpRol">Rol</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpNombreRol" checked>
                                <label class="custom-control-label" for="colImpNombreRol">Nombre Rol</label>
                            </div>

                            <hr class="my-2">

                            <!-- Grupo 3: Estado -->
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpStock" checked>
                                <label class="custom-control-label" for="colImpStock">Stock</label>
                            </div>
                             <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpEstado" checked>
                                <label class="custom-control-label" for="colImpEstado">Estado</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="colImpActualizado">
                                <label class="custom-control-label" for="colImpActualizado">Actualizado</label>
                            </div>
                        </div>

                        <div class="config-panel-footer border-top bg-white">
                            <button class="btn btn-outline-primary btn-block mb-2" id="btnCambiarOrientacion">
                                <i class="fas fa-sync-alt mr-2"></i><span>Cambiar Orientación</span>
                            </button>
                            <button class="btn btn-primary btn-block btn-imprimir-modal" onclick="window.print()">
                                <i class="fas fa-print mr-2"></i>Imprimir Reporte
                            </button>
                            <button class="btn btn-secondary btn-block mt-2" data-dismiss="modal">
                                <i class="fas fa-times mr-2"></i> Cerrar
                            </button>
                        </div>
                    </div>

                    <!-- Panel Derecho: Vista Previa -->
                    <div class="col-md-9 bg-light p-4 preview-container">
                        <div class="preview-paper myshadow" id="contenedorVistaPrevia">
                            <!-- Encabezado del Reporte Impreso -->
                            <div class="header-reporte mb-3">
                                <div class="header-grid">
                                    <!-- Izquierda: Datos -->
                                    <div class="header-left">
                                        <p class="text-muted mb-0" style="font-size: 0.85rem;"><strong>Registros:</strong> <span id="totalFilasImp">0</span></p>
                                        <p class="text-muted mb-0" style="font-size: 0.85rem;"><strong>Generado:</strong> <span id="fechaImpresion"></span></p>
                                    </div>
                                    <!-- Centro: Título -->
                                    <div class="header-center">
                                        <h4 class="font-weight-bold text-dark mb-0">INVENTARIO GENERAL</h4>
                                    </div>
                                    <!-- Derecha: Logo + Frase -->
                                    <div class="header-right">
                                        <div class="d-flex flex-column align-items-center">
                                            <img src="{% static 'img/logoAlmacen.png' %}" alt="Logo Almazen" class="logo-header-compact mb-1">
                                            <p class="text-muted mb-0" style="font-size: 0.7rem; text-align: center; max-width: 80px;">Venta por mayor y menor</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Tabla de Vista Previa -->
                            <div class="table-responsive preview-table-wrapper">
                                <table class="table table-bordered table-sm table-hover text-dark" id="tablaVistaPrevia">
                                    <thead class="thead-light">
                                        <!-- Se llena dinámicamente con JS -->
                                    </thead>
                                    <tbody>
                                        <!-- Se llena dinámicamente con JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
