<div class="modal fade" id="modalCrearPlan" tabindex="-1" role="dialog" aria-labelledby="modalCrearPlanLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <form method="post" action="">
                {% csrf_token %}
                <input type="hidden" name="action" value="crear_plan">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalCrearPlanLabel"><i class="fas fa-plus"></i> Nuevo Plan</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label>Código</label>
                            <input type="text" class="form-control" name="codigo" placeholder="basico" required>
                            <small class="text-muted">Debe coincidir con el plan de la empresa.</small>
                        </div>
                        <div class="form-group col-md-8">
                            <label>Nombre</label>
                            <input type="text" class="form-control" name="nombre" placeholder="Básico" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Máx. productos</label>
                            <input type="number" class="form-control" name="max_productos" min="0" placeholder="(vacío = ilimitado)">
                        </div>
                        <div class="form-group col-md-6">
                            <label>Máx. usuarios activos (total)</label>
                            <input type="number" class="form-control" name="max_usuarios_total" min="0" placeholder="(vacío = ilimitado)">
                        </div>
                    </div>

                    <div class="form-group mb-0">
                        <div class="custom-control custom-switch">
                            <input type="checkbox" class="custom-control-input" id="planActivoCrear" name="activo" checked>
                            <label class="custom-control-label" for="planActivoCrear">Activo</label>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
