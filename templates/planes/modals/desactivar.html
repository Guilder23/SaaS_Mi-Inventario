<div class="modal fade" id="modalDesactivarPlan" tabindex="-1" role="dialog" aria-labelledby="modalDesactivarPlanLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <form method="post" action="">
                {% csrf_token %}
                <input type="hidden" name="action" value="toggle_plan">
                <input type="hidden" name="plan_id" id="desactivarPlanId">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalDesactivarPlanLabel"><i class="fas fa-lock"></i> <span id="desactivarPlanTitulo">Desactivar plan</span></h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <p class="mb-0" id="desactivarPlanTexto">
                        ¿Seguro que deseas <span id="desactivarPlanAccionLower">desactivar</span> el plan <strong id="desactivarPlanCodigo"></strong>?
                    </p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger" id="desactivarPlanConfirmar">Desactivar</button>
                </div>
            </form>
        </div>
    </div>
</div>
