<div class="modal fade" id="modalVerPlan" tabindex="-1" role="dialog" aria-labelledby="modalVerPlanLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalVerPlanLabel"><i class="fas fa-eye"></i> Ver Plan</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Código</label>
                            <input type="text" class="form-control" id="verPlanCodigo" disabled>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" class="form-control" id="verPlanNombre" disabled>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Estado</label>
                            <input type="text" class="form-control" id="verPlanEstado" disabled>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Máx. productos</label>
                            <input type="text" class="form-control" id="verPlanMaxProductos" disabled>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Máx. usuarios (total)</label>
                            <input type="text" class="form-control" id="verPlanMaxUsuarios" disabled>
                        </div>
                    </div>
                </div>

                <hr>

                <h6 class="mb-2"><i class="fas fa-users-cog"></i> Límites por rol</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-roles mb-0">
                        <thead>
                            <tr>
                                <th style="width: 45%;">Rol</th>
                                <th style="width: 55%;">Máx. usuarios activos</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for rol,label in roles %}
                            <tr>
                                <td>{{ label }}</td>
                                <td>
                                    <span class="ver-plan-role" id="verRole__{{ rol }}">Ilimitado</span>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
