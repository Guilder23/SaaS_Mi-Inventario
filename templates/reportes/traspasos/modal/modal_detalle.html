{% load static %}

<!-- Estilos específicos del modal -->
<link rel="stylesheet" href="{% static 'css/reportes/traspasos/modal/modal_detalle.css' %}">

<!-- Modal para Ver Detalle de Traspaso -->
<div class="modal fade" id="modalVerTraspaso" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-exchange-alt"></i> Detalles del Traspaso
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="loadingTraspaso" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="sr-only">Cargando...</span>
                    </div>
                    <p class="mt-3 text-muted">Cargando detalles...</p>
                </div>

                <div id="traspasoDetalleContent" style="display: none;">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA: Código, Tipo y Ubicaciones -->
                        <div class="col-md-3">
                            <div class="card border-0 shadow-sm">
                                <div class="card-body text-center">
                                    <div id="detalleCodigoDisplay" class="mb-3">
                                        <span class="codigo-traspaso-badge" id="detalleCodigoTraspaso">-</span>
                                    </div>
                                    <div id="detalleTipoDisplay" class="mb-2">
                                        <div id="detalleTipoTraspaso">-</div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Información de Ubicaciones -->
                            <div class="info-section mt-3">
                                <h6 class="section-title">
                                    <i class="fas fa-location-dot"></i> Ubicaciones
                                </h6>
                                <div class="info-item">
                                    <label>Origen:</label>
                                    <p id="detalleOrigenNombre">-</p>
                                </div>
                                <div class="info-item">
                                    <label>Tipo:</label>
                                    <p id="detalleOrigenRol">-</p>
                                </div>
                                <div class="info-item mt-2">
                                    <label>Destino:</label>
                                    <p id="detalleDestinoNombre">-</p>
                                </div>
                                <div class="info-item">
                                    <label>Tipo:</label>
                                    <p id="detalleDestinoRol">-</p>
                                </div>
                            </div>
                        </div>

                        <!-- COLUMNA CENTRAL: Productos -->
                        <div class="col-md-6">
                            <div class="info-section">
                                <h6 class="section-title">
                                    <i class="fas fa-box-open"></i> Productos Transferidos
                                </h6>
                                <div class="tabla-productos-wrapper">
                                    <div id="loadingProductos" class="text-center py-3">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                        <p class="mt-2 text-muted small">Cargando productos...</p>
                                    </div>
                                    <table class="table table-sm tabla-productos" id="tablaProductosTraspaso" style="display: none;">
                                        <thead>
                                            <tr>
                                                <th>Código</th>
                                                <th>Producto</th>
                                                <th class="text-center">Cantidad</th>
                                            </tr>
                                        </thead>
                                        <tbody id="productosDetalleBodyTraspaso">
                                            <!-- Se llenará dinámicamente -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA: Información del Traspaso -->
                        <div class="col-md-3">
                            <div class="info-section">
                                <h6 class="section-title">
                                    <i class="fas fa-info-circle"></i> Información
                                </h6>
                                <div class="info-item">
                                    <label>Estado:</label>
                                    <p id="detalleEstadoTraspaso">-</p>
                                </div>
                                <div class="info-item">
                                    <label>Creado por:</label>
                                    <p id="detalleCreadoPor">-</p>
                                </div>
                                <div class="info-item">
                                    <label>Fecha:</label>
                                    <p id="detalleFechaTraspaso">-</p>
                                </div>
                            </div>

                            <!-- Comentario -->
                            <div class="info-section mt-3" id="detalleComentarioDiv" style="display: none;">
                                <h6 class="section-title">
                                    <i class="fas fa-comment"></i> Comentario
                                </h6>
                                <div class="comentario-box">
                                    <p id="detalleComentario">-</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
