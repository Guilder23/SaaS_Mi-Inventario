{% load static %}
<link rel="stylesheet" href="{% static 'css/reportes/ventas/modal/modal_imprimir.css' %}">

<div class="modal fade" id="modalImprimir" tabindex="-1" role="dialog" aria-labelledby="modalImprimirLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl" role="document">
        <div class="modal-content">
            <div class="modal-header d-print-none">
                <h5 class="modal-title" id="modalImprimirLabel">
                    <i class="fas fa-print mr-2"></i>Vista Previa de Impresion
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-0">
                <div class="row h-100 m-0">
                    <div class="col-md-3 border-right p-0 d-print-none" style="background-color: #f8f9fc;">
                        <div class="config-panel-header border-bottom">
                            <h6 class="font-weight-bold text-primary mb-0">Configuracion del Reporte</h6>
                        </div>

                        <div class="config-columns-scroll">
                            <h6 class="small font-weight-bold text-uppercase text-muted mb-3">Columnas Visibles</h6>

                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpCodigo" value="0" checked>
                                <label class="custom-control-label" for="colImpCodigo">Codigo</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpCliente" value="1" checked>
                                <label class="custom-control-label" for="colImpCliente">Cliente</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpRazon" value="2" checked>
                                <label class="custom-control-label" for="colImpRazon">Razon Social</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpVendedor" value="3" checked>
                                <label class="custom-control-label" for="colImpVendedor">Vendedor</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpUbicacion" value="4" checked>
                                <label class="custom-control-label" for="colImpUbicacion">Ubicacion</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpFecha" value="5" checked>
                                <label class="custom-control-label" for="colImpFecha">Fecha</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpPago" value="6" checked>
                                <label class="custom-control-label" for="colImpPago">Tipo Pago</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpEstado" value="7" checked>
                                <label class="custom-control-label" for="colImpEstado">Estado</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpMoneda" value="8" checked>
                                <label class="custom-control-label" for="colImpMoneda">Moneda</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpDescuento" value="9" checked>
                                <label class="custom-control-label" for="colImpDescuento">Descuento</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpTotal" value="10" checked>
                                <label class="custom-control-label" for="colImpTotal">Total</label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input columna-imprimir" id="colImpAcciones" value="11">
                                <label class="custom-control-label" for="colImpAcciones">Acciones</label>
                            </div>
                        </div>

                        <div class="config-panel-footer border-top bg-white">
                            <button class="btn btn-outline-primary btn-block mb-2" id="btnCambiarOrientacion">
                                <i class="fas fa-sync-alt mr-2"></i><span>Cambiar Orientacion</span>
                            </button>
                            <button class="btn btn-primary btn-block btn-imprimir-modal" onclick="ejecutarImpresionVentas()">
                                <i class="fas fa-print mr-2"></i>Imprimir Reporte
                            </button>
                            <button class="btn btn-secondary btn-block mt-2" data-dismiss="modal">
                                <i class="fas fa-times mr-2"></i> Cerrar
                            </button>
                        </div>
                    </div>

                    <div class="col-md-9 bg-light p-4 preview-container">
                        <div class="preview-paper myshadow" id="contenedorVistaPreviaVentas">
                            <div class="header-reporte mb-3">
                                <div class="header-grid">
                                    <!-- Izquierda: Datos -->
                                    <div class="header-left">
                                        <p class="text-muted mb-0" style="font-size: 0.85rem;"><strong>Generado:</strong> <span id="fechaImpresion">{% now "d/m/Y H:i" %}</span></p>
                                        <p class="text-muted mb-0" style="font-size: 0.85rem;"><strong>Por:</strong> {{ user.get_full_name|default:user.username }}</p>
                                    </div>
                                    <!-- Centro: Título -->
                                    <div class="header-center">
                                        <h4 class="font-weight-bold text-dark mb-0">REPORTE DE VENTAS</h4>
                                    </div>
                                    <!-- Derecha: Logo + Frase -->
                                    <div class="header-right">
                                        <div class="d-flex flex-column align-items-center">
                                            <img src="{% static 'img/logoAlmacen.png' %}" alt="Logo Almazen" class="logo-header-compact mb-1">
                                            <p class="text-muted mb-0" style="font-size: 0.7rem; text-align: center; max-width: 80px;">Venta por mayor y menor</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="table-responsive preview-table-wrapper">
                                <table class="table table-bordered table-sm table-hover text-dark" id="tablaVistaPreviaVentas">
                                    <thead></thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
